    // Filter buttons
    function applyFilter(filter) {
      document.querySelectorAll('.masonry-item').forEach(item => {
        const categories = item.dataset.category.split(',').map(c => c.trim());
        if (filter === 'all' || categories.includes(filter)) {
          item.style.opacity = '1';
          item.style.pointerEvents = 'auto';
          item.style.filter = 'grayscale(15%)';
        } else {
          item.style.opacity = '0.2';
          item.style.pointerEvents = 'none';
        }
      });
    }

    //  STATE 
    let currentPage = 'home';
    let menuOpen = false;

    //  DOM REFS 
    const app = document.getElementById('app');
    const nav = document.getElementById('nav');
    const menuBtn = document.getElementById('menuBtn');
    const menuOverlay = document.getElementById('menuOverlay');
    const cursor = document.getElementById('cursor');
    const cursorFollower = document.getElementById('cursorFollower');

    //  CURSOR 
    let mouseX = 0, mouseY = 0, followerX = 0, followerY = 0;

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursor.style.left = mouseX + 'px';
      cursor.style.top = mouseY + 'px';
    });

    function animateFollower() {
      followerX += (mouseX - followerX) * 0.12;
      followerY += (mouseY - followerY) * 0.12;
      cursorFollower.style.left = followerX + 'px';
      cursorFollower.style.top = followerY + 'px';
      requestAnimationFrame(animateFollower);
    }
    animateFollower();

    //  SCROLL NAV 
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 60);
    });

    //  MENU TOGGLE 
    menuBtn.addEventListener('click', toggleMenu);

    function toggleMenu() {
      menuOpen = !menuOpen;
      menuBtn.classList.toggle('active', menuOpen);
      menuOverlay.classList.toggle('open', menuOpen);
      document.body.style.overflow = menuOpen ? 'hidden' : '';
    }

    function closeMenu() {
      menuOpen = false;
      menuBtn.classList.remove('active');
      menuOverlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    //  ROUTER 
    function navigate(page, opts = {}) {
      closeMenu();
      window.scrollTo({ top: 0, behavior: 'instant' });
      currentPage = page;

      let html = '';

      if (opts.type && opts.id) {
        // Detail pages
        const { type, id } = opts;
        if (type === 'photography') {
          const item = DATA.photographs.find(p => p.id === id);
          if (item) html = renderArtDetail(item, 'photography');
        } else if (type === 'artwork') {
          const item = DATA.artworks.find(a => a.id === id);
          if (item) html = renderArtDetail(item, 'artwork');
        } else if (type === 'poem') {
          const item = DATA.poems.find(po => po.id === id);
          if (item) html = renderPoemDetail(item);
        } else if (type === 'essay') {
          const item = DATA.essays.find(e => e.id === id);
          if (item) html = renderEssayDetail(item);
        } else if (type === 'letter') {
          const item = DATA.letters.find(l => l.id === id);
          if (item) html = renderLetterDetail(item);
        } else if (type === 'book') {
          const item = DATA.books.find(b => b.id === id);
          if (item) html = renderBookDetail(item);
        }
      } else {
        switch (page) {
          case 'home': html = renderHome(); break;
          case 'photography': html = renderPhotography(); break;
          case 'artworks': html = renderArtworks(); break;
          case 'poetry': html = renderPoetry(); break;
          case 'books': html = renderBooks(); break;
          case 'essays': html = renderEssays(); break;
          case 'letters': html = renderLetters(); break;
          case 'about': html = renderAbout(); break;
          case 'contact': html = renderContact(); break;
          default: html = renderHome();
        }
      }

      app.innerHTML = html;
      bindEvents();
      setTimeout(() => {
        if (typeof applyFilter === 'function') applyFilter('all');
      }, 300);
    }

    //  BIND EVENTS 
    function bindEvents() {
      // Nav logo
      document.querySelectorAll('[data-page]').forEach(el => {
        el.addEventListener('click', e => {
          e.preventDefault();
          navigate(el.dataset.page);
        });
      });

      // Detail links
      document.querySelectorAll('[data-nav="detail"]').forEach(el => {
        el.addEventListener('click', e => {
          e.preventDefault();
          navigate(el.dataset.type + '-detail', {
            type: el.dataset.type,
            id: el.dataset.id
          });
        });
      });

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const filter = btn.dataset.filter;
          document.querySelectorAll('.masonry-item').forEach(item => {
            const cats = item.dataset.category || '';
            const match = filter === 'all' || cats.split(',').map(c => c.trim()).includes(filter);
            item.style.opacity = match ? '1' : '0.2';
            item.style.pointerEvents = match ? 'auto' : 'none';
          });
        });
      });

      // force run after DOM settles
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          document.querySelectorAll('.masonry-item').forEach(item => {
            item.style.opacity = '1';
            item.style.pointerEvents = 'auto';
          });
        });
      });

    }

    //  HOVER EFFECTS ON INTERACTIVE ELEMENTS 
    document.addEventListener('mouseover', e => {
      if (e.target.closest('a, button, [data-nav], .cat-card, .masonry-item, .poem-card, .essay-card, .letter-card, .book-card')) {
        cursor.style.transform = 'translate(-50%,-50%) scale(2)';
      }
    });
    document.addEventListener('mouseout', e => {
      if (e.target.closest('a, button, [data-nav], .cat-card, .masonry-item, .poem-card, .essay-card, .letter-card, .book-card')) {
        cursor.style.transform = 'translate(-50%,-50%) scale(1)';
      }
    });

    //  MENU LINKS 
    document.querySelectorAll('.menu-link').forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        navigate(link.dataset.page);
      });
    });

    document.querySelector('.nav-logo').addEventListener('click', e => {
      e.preventDefault();
      navigate('home');
    });

    //  SCROLL REVEAL 
    function initScrollReveal() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.style.opacity = '1';
            entry.target.style.transform = 'translateY(0)';
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });

      document.querySelectorAll('.masonry-item, .poem-card, .essay-card, .letter-card, .book-card, .writing-item, .cat-card').forEach((el, i) => {
        if (!el.classList.contains('filter-hidden')) {
          el.style.opacity = '0';
          el.style.transform = 'translateY(32px)';
          el.style.transition = `opacity 0.6s ease ${i * 0.06}s, transform 0.6s ease ${i * 0.06}s`;
          observer.observe(el);
        }
      });
    }

    //  MutationObserver for scroll reveal after DOM updates 
    const appObserver = new MutationObserver(() => {
      setTimeout(initScrollReveal, 50);
    });
    appObserver.observe(app, { childList: true, subtree: false });

    //  INIT 
    navigate('home');

    // ============================================================
    // GOOGLE APPS SCRIPT INTEGRATION
    //  PASTE YOUR APPS SCRIPT URL BELOW 
    // ============================================================
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxEao3OlcUZYoGa0u3tds2lNOQdtdAS9-UgCq--kwTcNcbd2iE0_iP6mUIcLsppu7tX/exec';
    // ============================================================

    //  Helpers 
    function gid(id) { return document.getElementById(id); }
    function showStatus(msg, color) {
      const s = gid('formStatus');
      if (!s) return;
      s.style.display = 'block';
      s.style.borderColor = color || 'var(--rust)';
      s.style.color = color || 'var(--rust)';
      s.textContent = msg;
    }
    function hideStatus() { const s = gid('formStatus'); if (s) s.style.display = 'none'; }

    //  Main submit function 
    function handleContactSubmit(e) {
      if (e) { e.preventDefault(); e.stopPropagation(); }

      const val = id => { const el = gid(id); return el ? el.value.trim() : ''; };

      const name = val('cf_name');
      const email = val('cf_email');
      const phone = val('cf_phone');
      const type = val('cf_type');
      const subject = val('cf_subject');
      const message = val('cf_message');
      const btn = gid('cf_submit');

      //  Validate 
      if (!name || !email || !subject || !message || !type) {
        showStatus('Please fill in all required fields marked with *.', 'var(--rust)');
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showStatus('Please enter a valid email address.', 'var(--rust)');
        return;
      }
      if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
        showStatus('Setup needed: replace YOUR_APPS_SCRIPT_URL_HERE in the HTML with your Apps Script URL.', 'orange');
        return;
      }

      //  Loading state 
      if (btn) { btn.textContent = 'Sending...'; btn.disabled = true; btn.style.opacity = '0.5'; }
      hideStatus();

      const timestamp = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });

      //  METHOD: hidden form POST via iframe (guaranteed delivery, no CORS issues) 
      // This is the most reliable way to POST to Apps Script from a plain HTML file.
      // It submits a real HTML form to a hidden iframe, Apps Script receives it perfectly.

      // Create hidden iframe to absorb the response (so page doesn't navigate)
      let iframe = gid('gs_iframe');
      if (!iframe) {
        iframe = document.createElement('iframe');
        iframe.name = 'gs_iframe';
        iframe.id = 'gs_iframe';
        iframe.style.cssText = 'display:none;width:0;height:0;border:0;position:absolute;';
        document.body.appendChild(iframe);
      }

      // Create hidden form
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = APPS_SCRIPT_URL;
      form.target = 'gs_iframe';   // submit INTO the iframe, page stays put
      form.style.display = 'none';

      // Add fields, prefix phone with apostrophe so Sheets treats it as text
      const fields = { name, email, phone: "'" + phone, type, subject, message, timestamp, page: 'Contact Form' };
      Object.entries(fields).forEach(([k, v]) => {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = k;
        input.value = v;
        form.appendChild(input);
      });

      document.body.appendChild(form);

      // Listen for iframe load = Apps Script responded = success
      iframe.onload = function () {
        // Clean up the form
        if (form.parentNode) form.parentNode.removeChild(form);

        // Show success, hide the contact form
        const contactDiv = gid('contactForm');
        const successDiv = gid('formSuccess');
        if (contactDiv) contactDiv.style.display = 'none';
        if (successDiv) {
          successDiv.style.display = 'block';
          successDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Reset button just in case
        if (btn) { btn.textContent = 'Send Message \u2192'; btn.disabled = false; btn.style.opacity = '1'; }
        iframe.onload = null; // remove listener
      };

      // Fallback: if iframe doesn't fire onload in 8s, still show success
      setTimeout(function () {
        const contactDiv = gid('contactForm');
        const successDiv = gid('formSuccess');
        if (successDiv && successDiv.style.display === 'none') {
          if (contactDiv) contactDiv.style.display = 'none';
          successDiv.style.display = 'block';
        }
        if (btn) { btn.textContent = 'Send Message \u2192'; btn.disabled = false; btn.style.opacity = '1'; }
        if (form.parentNode) form.parentNode.removeChild(form);
      }, 8000);

      // Submit the form
      form.submit();
    }

    // ——— Reset / Send Another ———
    function resetContactForm() {
      const contactDiv = gid('contactForm');
      const successDiv = gid('formSuccess');
      const btn = gid('cf_submit');

      if (successDiv) successDiv.style.display = 'none';
      if (contactDiv) {
        contactDiv.style.display = 'block';
        contactDiv.querySelectorAll('input, textarea, select').forEach(el => el.value = '');
        contactDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
      if (btn) { btn.textContent = 'Send Message \u2192'; btn.disabled = false; btn.style.opacity = '1'; }
      hideStatus();
    }

  </script>
</body>

</html>
