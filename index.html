<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Shreyash Srivastva, Artist &amp; Writer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet" />
  <style>
    /* =============================================
   SHREYASH SRIVASTVA — GALLERY
   Aesthetic: Editorial Brutalism meets Refined Ink
   ============================================= */

    :root {
      --ink: #0e0d0b;
      --paper: #f5f0e8;
      --cream: #ede6d6;
      --dust: #c8bfae;
      --rust: #8b3a2a;
      --gold: #c9a84c;
      --slate: #3d3d3d;
      --white: #fdfaf5;

      --font-display: 'Playfair Display', serif;
      --font-body: 'Cormorant Garamond', serif;
      --font-mono: 'Space Mono', monospace;

      --nav-h: 64px;
      --ease: cubic-bezier(0.76, 0, 0.24, 1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 1.125rem;
      line-height: 1.7;
      cursor: none;
      overflow-x: hidden;
    }

    /* ——— CUSTOM CURSOR ——— */
    .cursor {
      width: 8px;
      height: 8px;
      background: var(--rust);
      border-radius: 50%;
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s, width 0.3s var(--ease), height 0.3s var(--ease), background 0.3s;
      mix-blend-mode: multiply;
    }

    .cursor-follower {
      width: 36px;
      height: 36px;
      border: 1px solid var(--rust);
      border-radius: 50%;
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.18s var(--ease), width 0.35s var(--ease), height 0.35s var(--ease), opacity 0.3s;
      opacity: 0.6;
    }

    body:has(a:hover) .cursor,
    body:has(button:hover) .cursor {
      width: 16px;
      height: 16px;
    }

    body:has(a:hover) .cursor-follower,
    body:has(button:hover) .cursor-follower {
      width: 56px;
      height: 56px;
      opacity: 0.3;
    }

    /* ——— NAV ——— */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      z-index: 500;
      mix-blend-mode: normal;
      transition: background 0.4s, backdrop-filter 0.4s;
    }

    .nav.scrolled {
      background: rgba(245, 240, 232, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--dust);
    }

    .nav-logo {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .nav-tagline {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      color: var(--slate);
      text-transform: uppercase;
    }

    .nav-menu-btn {
      background: none;
      border: none;
      cursor: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px;
    }

    .nav-menu-btn span {
      display: block;
      width: 28px;
      height: 1.5px;
      background: var(--ink);
      transition: transform 0.4s var(--ease), opacity 0.3s;
    }

    .nav-menu-btn.active span:first-child {
      transform: translateY(3.75px) rotate(45deg);
    }

    .nav-menu-btn.active span:last-child {
      transform: translateY(-3.75px) rotate(-45deg);
    }

    /* ——— MENU OVERLAY ——— */
    .menu-overlay {
      position: fixed;
      inset: 0;
      background: var(--ink);
      z-index: 400;
      display: flex;
      align-items: center;
      clip-path: inset(0 0 100% 0);
      transition: clip-path 0.8s var(--ease);
    }

    .menu-overlay.open {
      clip-path: inset(0 0 0% 0);
    }

    .menu-inner {
      width: 100%;
      padding: 6rem 2.5rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    .menu-links {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .menu-link {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 4.5vw, 3rem);
      font-weight: 700;
      color: var(--paper);
      text-decoration: none;
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
      line-height: 1.1;
      transition: color 0.1s, transform 0.1s;
      transform: translateX(-20px);
      opacity: 0;
    }

    .menu-overlay.open .menu-link {
      transform: translateX(0);
      opacity: 1;
    }

    .menu-overlay.open .menu-link:nth-child(1) {
      transition-delay: 0.12s;
    }

    .menu-overlay.open .menu-link:nth-child(2) {
      transition-delay: 0.17s;
    }

    .menu-overlay.open .menu-link:nth-child(3) {
      transition-delay: 0.22s;
    }

    .menu-overlay.open .menu-link:nth-child(4) {
      transition-delay: 0.27s;
    }

    .menu-overlay.open .menu-link:nth-child(5) {
      transition-delay: 0.32s;
    }

    .menu-overlay.open .menu-link:nth-child(6) {
      transition-delay: 0.37s;
    }

    .menu-overlay.open .menu-link:nth-child(7) {
      transition-delay: 0.42s;
    }

    .menu-overlay.open .menu-link:nth-child(8) {
      transition-delay: 0.47s;
    }

    .menu-overlay.open .menu-link:nth-child(9) {
      transition-delay: 0.52s;
    }

    .menu-link:hover {
      color: var(--gold);
      transform: translateX(12px);
    }

    .menu-num {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--rust);
      min-width: 2.5rem;
    }

    .menu-footer {
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      padding-top: 1.5rem;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--dust);
      display: flex;
      justify-content: space-between;
    }

    /* ——— PAGE TRANSITIONS ——— */
    #app {
      min-height: 100vh;
    }

    .page {
      animation: pageIn 0.7s var(--ease) forwards;
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ——— HERO ——— */
    .hero {
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      overflow: hidden;
      max-height: 100vh;
      /* add this */
    }

    .hero-left {
      background: var(--ink);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 4rem 3rem;
      position: relative;
      overflow: hidden;
    }

    .hero-left::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 80% 20%, rgba(139, 58, 42, 0.3) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero-grain {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
    }

    .hero-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--rust);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .hero-name {
      font-family: var(--font-display);
      font-size: clamp(3.5rem, 7vw, 6.5rem);
      font-weight: 900;
      color: var(--paper);
      line-height: 0.95;
      letter-spacing: -0.03em;
      margin-bottom: 2rem;
    }

    .hero-name em {
      font-style: italic;
      color: var(--gold);
    }

    .hero-desc {
      font-family: var(--font-body);
      font-size: 1.05rem;
      color: var(--dust);
      max-width: 380px;
      line-height: 1.8;
      font-weight: 300;
    }

    .hero-scroll-hint {
      position: absolute;
      bottom: 2rem;
      right: 2rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--dust);
      letter-spacing: 0.15em;
      writing-mode: vertical-rl;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .hero-scroll-hint::after {
      content: '';
      display: block;
      width: 1px;
      height: 40px;
      background: var(--dust);
      animation: scrollLine 1.5s ease-in-out infinite;
    }

    @keyframes scrollLine {

      0%,
      100% {
        transform: scaleY(1);
        opacity: 1;
      }

      50% {
        transform: scaleY(0.4);
        opacity: 0.4;
      }
    }

    .hero-right {
      display: grid;
      grid-template-rows: 1fr 1fr;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      background: var(--dust);
      height: 100vh;
      /* add this */
      max-height: 100vh;
      /* add this */
      overflow: hidden;
      /* add this */
    }

    .hero-tile {
      background: var(--cream);
      overflow: hidden;
      position: relative;
      cursor: none;
      min-height: 0;
      /* add this */
      min-width: 0;
      /* add this */
    }

    .hero-tile:hover .hero-tile-img {
      transform: scale(1.06);
    }

    .hero-tile-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transition: transform 0.7s var(--ease);
    }

    .hero-tile-label {
      position: absolute;
      bottom: 1rem;
      left: 1rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      background: var(--paper);
      color: var(--ink);
      padding: 0.2rem 0.5rem;
      text-transform: uppercase;
    }

    /* ——— MARQUEE ——— */
    .marquee-bar {
      background: var(--ink);
      color: var(--gold);
      padding: 0.9rem 0;
      overflow: hidden;
      white-space: nowrap;
    }

    .marquee-inner {
      display: inline-block;
      animation: marqueeScroll 28s linear infinite;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    @keyframes marqueeScroll {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-50%);
      }
    }

    /* ——— SECTION LABEL ——— */
    .section-label {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--rust);
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--dust);
      max-width: 80px;
    }

    /* ——— FEATURED SECTION ——— */
    .featured-section {
      padding: 6rem 2.5rem;
    }

    .featured-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      grid-template-rows: auto;
      gap: 1.5rem;
    }

    .featured-card {
      position: relative;
      overflow: hidden;
      background: var(--cream);
      cursor: none;
    }

    .featured-card.large {
      grid-row: span 2;
    }

    .featured-card-img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
      transition: transform 0.7s var(--ease);
      filter: grayscale(20%);
    }

    .featured-card.large .featured-card-img {
      aspect-ratio: 2/3;
    }

    .featured-card:hover .featured-card-img {
      transform: scale(1.05);
      filter: grayscale(0%);
    }

    .featured-card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.5rem;
      background: linear-gradient(transparent, rgba(14, 13, 11, 0.85));
      color: var(--paper);
      transform: translateY(0);
    }

    .featured-card-cat {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.4rem;
    }

    .featured-card-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .featured-card.large .featured-card-title {
      font-size: 1.8rem;
    }

    /* ——— ABOUT STRIP ——— */
    .about-strip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 70vh;
      border-top: 1px solid var(--dust);
      border-bottom: 1px solid var(--dust);
    }

    .about-strip-left {
      padding: 5rem 3rem;
      border-right: 1px solid var(--dust);
    }

    .about-strip-right {
      background: var(--ink);
      padding: 5rem 3rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .about-big {
      font-family: var(--font-display);
      font-size: clamp(3rem, 5vw, 5rem);
      font-weight: 900;
      line-height: 1.0;
      letter-spacing: -0.03em;
      margin-bottom: 2rem;
    }

    .about-big em {
      font-style: italic;
      color: var(--rust);
    }

    .about-text {
      font-size: 1.05rem;
      color: var(--dust);
      line-height: 1.9;
      font-weight: 300;
      max-width: 420px;
    }

    .about-text.dark {
      color: var(--dust);
    }

    .about-year {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--slate);
      letter-spacing: 0.15em;
      margin-top: 3rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 2rem;
      background: transparent;
      border: 1px solid var(--rust);
      color: var(--rust);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: none;
      transition: background 0.3s, color 0.3s, transform 0.3s;
      margin-top: 2rem;
    }

    .btn:hover {
      background: var(--rust);
      color: var(--paper);
      transform: translateX(4px);
    }

    .btn.light {
      border-color: var(--gold);
      color: var(--gold);
    }

    .btn.light:hover {
      background: var(--gold);
      color: var(--ink);
    }

    /* ——— QUOTE SECTION ——— */
    .quote-section {
      padding: 6rem 2.5rem;
      text-align: center;
      max-width: 900px;
      margin: 0 auto;
    }

    .quote-mark {
      font-family: var(--font-display);
      font-size: 8rem;
      color: var(--dust);
      line-height: 0.5;
      display: block;
      margin-bottom: 1rem;
    }

    .quote-text {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 3.5vw, 2.8rem);
      font-style: italic;
      font-weight: 400;
      line-height: 1.4;
      color: var(--ink);
    }

    .quote-attr {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      color: var(--rust);
      text-transform: uppercase;
      margin-top: 2rem;
    }

    /* ——— CATEGORY GRID ——— */
    .categories-section {
      padding: 5rem 2.5rem;
      background: var(--ink);
    }

    .categories-section .section-label {
      color: var(--gold);
    }

    .categories-section .section-label::after {
      background: rgba(255, 255, 255, 0.15);
    }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .cat-card {
      padding: 3rem 2rem;
      background: var(--ink);
      cursor: none;
      transition: background 0.35s;
      text-decoration: none;
      display: block;
    }

    .cat-card:hover {
      background: var(--rust);
    }

    .cat-card:hover .cat-num {
      color: var(--paper);
    }

    .cat-num {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--rust);
      letter-spacing: 0.15em;
      margin-bottom: 1.5rem;
      transition: color 0.3s;
    }

    .cat-name {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--paper);
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    .cat-desc {
      font-family: var(--font-body);
      font-size: 0.92rem;
      color: var(--dust);
      line-height: 1.7;
      font-weight: 300;
    }

    .cat-arrow {
      display: block;
      margin-top: 2rem;
      color: var(--gold);
      font-size: 1.4rem;
      transition: transform 0.3s;
    }

    .cat-card:hover .cat-arrow {
      transform: translateX(8px);
    }

    /* ——— WRITING PREVIEW ——— */
    .writing-section {
      padding: 6rem 2.5rem;
    }

    .writing-list {
      display: flex;
      flex-direction: column;
    }

    .writing-item {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 2rem;
      padding: 2.5rem 0;
      border-bottom: 1px solid var(--dust);
      cursor: none;
      text-decoration: none;
      color: var(--ink);
      transition: background 0.2s;
    }

    .writing-item:first-child {
      border-top: 1px solid var(--dust);
    }

    .writing-item:hover {
      padding-left: 1.5rem;
    }

    .writing-item:hover .writing-title {
      color: var(--rust);
    }

    .writing-cat {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--rust);
      margin-bottom: 0.5rem;
    }

    .writing-title {
      font-family: var(--font-display);
      font-size: clamp(1.2rem, 2.5vw, 1.8rem);
      font-weight: 700;
      line-height: 1.2;
      transition: color 0.3s;
    }

    .writing-excerpt {
      font-size: 0.95rem;
      color: var(--slate);
      margin-top: 0.5rem;
      max-width: 600px;
      font-weight: 300;
    }

    .writing-date {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--dust);
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    /* ——— FOOTER ——— */
    .footer {
      background: var(--ink);
      padding: 4rem 2.5rem 2rem;
      color: var(--paper);
    }

    .footer-top {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 3rem;
      padding-bottom: 3rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 2rem;
    }

    .footer-brand-name {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 1rem;
    }

    .footer-brand-sub {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--dust);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .footer-col-title {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.2rem;
    }

    .footer-col a {
      display: block;
      font-size: 0.95rem;
      color: var(--dust);
      text-decoration: none;
      margin-bottom: 0.6rem;
      transition: color 0.3s;
    }

    .footer-col a:hover {
      color: var(--paper);
    }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--dust);
      letter-spacing: 0.1em;
    }

    /* ——— GALLERY PAGE ——— */
    .gallery-hero {
      height: 45vh;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 4rem 2.5rem;
      position: relative;
      overflow: hidden;
      margin-top: var(--nav-h);
    }

    .gallery-hero::before {
      content: attr(data-title);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-display);
      font-size: 20vw;
      font-weight: 900;
      color: rgba(255, 255, 255, 0.03);
      white-space: nowrap;
      pointer-events: none;
      letter-spacing: -0.05em;
    }

    .gallery-hero-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--rust);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .gallery-hero-title {
      font-family: var(--font-display);
      font-size: clamp(3rem, 6vw, 5.5rem);
      font-weight: 900;
      color: var(--paper);
      line-height: 0.95;
      letter-spacing: -0.03em;
    }

    .gallery-hero-title em {
      font-style: italic;
      color: var(--gold);
    }

    /* ——— FILTERS ——— */
    .filter-bar {
      padding: 1.5rem 2.5rem;
      border-bottom: 1px solid var(--dust);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--slate);
      margin-right: 0.5rem;
    }

    .filter-btn {
      padding: 0.35rem 1rem;
      background: transparent;
      border: 1px solid var(--dust);
      color: var(--slate);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: none;
      transition: all 0.2s;
    }

    .filter-btn.active,
    .filter-btn:hover {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--paper);
    }

    /* ——— MASONRY GRID ——— */
    .masonry-section {
      padding: 3rem 2.5rem 5rem;
    }

    .masonry-grid {
      columns: 3;
      column-gap: 1.2rem;
    }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 1.2rem;
      position: relative;
      overflow: hidden;
      cursor: none;
      background: var(--cream);
    }

    .masonry-item img {
      width: 100%;
      display: block;
      transition: transform 0.6s var(--ease);
      filter: grayscale(15%);
    }

    .masonry-item:hover img {
      transform: scale(1.04);
      filter: grayscale(0%);
    }

    .masonry-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent 50%, rgba(14, 13, 11, 0.9) 100%);
      opacity: 0;
      transition: opacity 0.4s;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1.5rem;
      color: var(--paper);
    }

    .masonry-item:hover .masonry-overlay {
      opacity: 1;
    }

    .masonry-overlay-cat {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.3rem;
    }

    .masonry-overlay-title {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 700;
    }

    /* ——— POETRY LIST ——— */
    .poetry-list {
      padding: 3rem 2.5rem 5rem;
    }

    .poem-card {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 2.5rem;
      padding: 3rem 0;
      border-bottom: 1px solid var(--dust);
      cursor: none;
      text-decoration: none;
      color: var(--ink);
      align-items: start;
    }

    .poem-card:first-child {
      border-top: 1px solid var(--dust);
    }

    .poem-card:hover .poem-title {
      color: var(--rust);
    }

    .poem-num {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--dust);
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }

    .poem-card-left {
      padding-right: 2rem;
      border-right: 1px solid var(--dust);
    }

    .poem-date {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--rust);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .poem-title {
      font-family: var(--font-display);
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 1rem;
      transition: color 0.3s;
    }

    .poem-preview {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1rem;
      color: var(--slate);
      line-height: 1.8;
      font-weight: 300;
    }

    .poem-theme {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--paper);
      background: var(--rust);
      padding: 0.2rem 0.6rem;
      margin-top: 1rem;
    }

    /* ——— ESSAY LIST ——— */
    .essay-list {
      padding: 3rem 2.5rem 5rem;
    }

    .essay-card {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 2.5rem;
      padding: 2.5rem 0;
      border-bottom: 1px solid var(--dust);
      cursor: none;
      text-decoration: none;
      color: var(--ink);
    }

    .essay-card:first-child {
      border-top: 1px solid var(--dust);
    }

    .essay-card:hover .essay-title {
      color: var(--rust);
    }

    .essay-type {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--rust);
      margin-bottom: 0.6rem;
    }

    .essay-title {
      font-family: var(--font-display);
      font-size: clamp(1.2rem, 2.8vw, 1.9rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.8rem;
      transition: color 0.3s;
    }

    .essay-excerpt {
      font-size: 0.95rem;
      color: var(--slate);
      line-height: 1.75;
      font-weight: 300;
    }

    .essay-meta {
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      align-items: flex-end;
      padding-top: 0.3rem;
    }

    .essay-meta span {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--dust);
      letter-spacing: 0.1em;
    }

    .essay-readtime {
      background: var(--cream);
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--dust);
      color: var(--slate) !important;
    }

    /* ——— DETAIL PAGE ——— */
    .detail-page {
      padding-top: var(--nav-h);
    }

    .detail-hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - var(--nav-h));
    }

    .detail-image-side {
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem;
      position: sticky;
      top: var(--nav-h);
      height: calc(100vh - var(--nav-h));
    }

    .detail-image-side img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .detail-info-side {
      padding: 5rem 4rem;
      border-left: 1px solid var(--dust);
      overflow-y: auto;
    }

    .detail-back {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dust);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      cursor: none;
      transition: color 0.2s;
    }

    .detail-back::before {
      content: "←";
      margin-right: 0.3rem;
    }

    .detail-back:hover {
      color: var(--gold);
    }

    .detail-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--rust);
      margin-bottom: 1rem;
    }

    .detail-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 2rem;
    }

    .detail-title em {
      font-style: italic;
    }

    .detail-meta-row {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
      padding-bottom: 2.5rem;
      border-bottom: 1px solid var(--dust);
    }

    .detail-meta-item {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .detail-meta-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dust);
    }

    .detail-meta-value {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--ink);
    }

    .detail-description {
      font-size: 1.05rem;
      line-height: 1.9;
      color: black;
      font-weight: 300;
      margin-bottom: 3rem;
    }

    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 3rem;
    }

    .detail-tag {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--rust);
      border: 1px solid var(--rust);
      padding: 0.25rem 0.7rem;
    }

    /* ——— POEM DETAIL ——— */
    .poem-detail-content {
      max-width: 680px;
      margin: 0 auto;
      padding: 5rem 2.5rem;
    }

    .poem-full-text {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-style: italic;
      line-height: 2.2;
      color: var(--ink);
      font-weight: 400;
      white-space: pre-line;
    }

    .poem-full-text p {
      margin-bottom: 2rem;
    }

    /* ——— ESSAY DETAIL ——— */
    .essay-detail {
      max-width: 760px;
      margin: 0 auto;
      padding: 4rem 2.5rem 6rem;
    }

    .essay-detail-body {
      font-size: 1.1rem;
      line-height: 1.95;
      color: var(--slate);
      font-weight: 300;
    }

    .essay-detail-body p {
      margin-bottom: 1.8rem;
    }

    .essay-detail-body h2 {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--ink);
      margin: 3rem 0 1rem;
    }

    .essay-detail-body blockquote {
      border-left: 3px solid var(--rust);
      padding-left: 1.5rem;
      font-style: italic;
      color: var(--ink);
      margin: 2rem 0;
    }

    /* ——— ABOUT PAGE ——— */
    .about-page {
      padding-top: var(--nav-h);
    }

    .about-page-hero {
      height: 60vh;
      background: var(--ink);
      display: flex;
      align-items: flex-end;
      padding: 4rem 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .about-page-hero::before {
      content: 'ABOUT';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-display);
      font-size: 20vw;
      font-weight: 900;
      color: rgba(255, 255, 255, 0.025);
      pointer-events: none;
      letter-spacing: -0.05em;
    }

    .about-page-hero-title {
      font-family: var(--font-display);
      font-size: clamp(3rem, 6vw, 5.5rem);
      font-weight: 900;
      color: var(--paper);
      line-height: 0.95;
      letter-spacing: -0.03em;
    }

    .about-page-hero-title em {
      font-style: italic;
      color: var(--gold);
    }

    .about-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .about-text-col {
      padding: 5rem 4rem;
      border-right: 1px solid var(--dust);
    }

    .about-sidebar {
      padding: 5rem 3rem;
    }

    .about-body {
      font-size: 1.08rem;
      line-height: 1.95;
      color: var(--slate);
      font-weight: 300;
      max-width: 520px;
    }

    .about-body p {
      margin-bottom: 1.5rem;
    }

    .about-stat-list {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .about-stat {
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--dust);
    }

    .about-stat-num {
      font-family: var(--font-display);
      font-size: 3.5rem;
      font-weight: 900;
      color: var(--rust);
      line-height: 1;
      margin-bottom: 0.3rem;
    }

    .about-stat-label {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--slate);
    }

    /* ——— CONTACT PAGE ——— */
    .contact-page {
      padding-top: var(--nav-h);
    }

    .contact-hero {
      height: 40vh;
      background: var(--ink);
      display: flex;
      align-items: flex-end;
      padding: 4rem 2.5rem;
    }

    .contact-hero-title {
      font-family: var(--font-display);
      font-size: clamp(3rem, 6vw, 5.5rem);
      font-weight: 900;
      color: var(--paper);
      line-height: 0.95;
      letter-spacing: -0.03em;
    }

    .contact-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .contact-form-col {
      padding: 5rem 4rem;
      border-right: 1px solid var(--dust);
    }

    .contact-info-col {
      padding: 5rem 3rem;
    }

    .form-group {
      margin-bottom: 2rem;
    }

    .form-label {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--slate);
      margin-bottom: 0.6rem;
    }

    .form-input {
      width: 100%;
      padding: 0.9rem 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--dust);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 1.05rem;
      outline: none;
      transition: border-color 0.3s;
      cursor: none;
    }

    .form-input:focus {
      border-color: var(--rust);
    }

    .form-input::placeholder {
      color: var(--dust);
    }

    textarea.form-input {
      resize: none;
      min-height: 140px;
      line-height: 1.7;
    }

    .btn-submit {
      padding: 1rem 3rem;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: none;
      transition: background 0.3s, transform 0.3s;
      display: inline-block;
      margin-top: 1rem;
    }

    .btn-submit:hover {
      background: var(--rust);
      transform: translateX(4px);
    }

    .contact-info-item {
      margin-bottom: 3rem;
    }

    .contact-info-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--rust);
      margin-bottom: 0.5rem;
    }

    .contact-info-value {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--ink);
    }

    /* ——— BOOKS PAGE ——— */
    .books-grid {
      padding: 3rem 2.5rem 5rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2.5rem;
    }

    .book-card {
      cursor: none;
      text-decoration: none;
      color: var(--ink);
      display: block;
    }

    .book-card:hover .book-cover {
      transform: translateY(-8px);
      box-shadow: 0 24px 48px rgba(14, 13, 11, 0.18);
    }

    .book-cover {
      aspect-ratio: 3/4;
      background: var(--cream);
      overflow: hidden;
      margin-bottom: 1.2rem;
      transition: transform 0.4s var(--ease), box-shadow 0.4s;
      position: relative;
    }

    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .book-cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .book-cover-placeholder-text {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.2;
      color: var(--ink);
      font-style: italic;
    }

    .book-genre {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--rust);
      margin-bottom: 0.4rem;
    }

    .book-title {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.4rem;
      transition: color 0.3s;
    }

    .book-card:hover .book-title {
      color: var(--rust);
    }

    .book-year {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--dust);
      letter-spacing: 0.1em;
    }

    /* ——— LETTERS PAGE ——— */
    .letters-grid {
      padding: 3rem 2.5rem 5rem;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
    }

    .letter-card {
      background: var(--cream);
      padding: 2.5rem;
      cursor: none;
      text-decoration: none;
      color: var(--ink);
      display: block;
      border: 1px solid transparent;
      transition: border-color 0.3s, transform 0.3s;
      position: relative;
    }

    .letter-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 0;
      background: var(--rust);
      transition: height 0.4s var(--ease);
    }

    .letter-card:hover::before {
      height: 100%;
    }

    .letter-card:hover {
      border-color: var(--rust);
      transform: translateX(4px);
    }

    .letter-type {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--rust);
      margin-bottom: 0.6rem;
    }

    .letter-title {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.8rem;
      transition: color 0.3s;
    }

    .letter-card:hover .letter-title {
      color: var(--rust);
    }

    .letter-excerpt {
      font-size: 0.95rem;
      color: var(--slate);
      line-height: 1.75;
      font-weight: 300;
      margin-bottom: 1.2rem;
    }

    .letter-meta {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: var(--dust);
      letter-spacing: 0.1em;
      display: flex;
      justify-content: space-between;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--dust);
    }


    /* ==============================
   RESPONSIVE — COMPREHENSIVE FIX
   ============================== */

    /* ——— TABLET (max 1024px) ——— */
    @media (max-width: 1024px) {

      /* Nav */
      .nav {
        padding: 0 1.5rem;
      }

      .nav-tagline {
        font-size: 0.58rem;
      }

      /* Hero */
      .hero {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }

      .hero-left {
        min-height: 60vh;
        padding: 3rem 2rem 4rem;
      }

      .hero-right {
        height: 45vw;
        min-height: 260px;
      }

      /* Featured */
      .featured-section {
        padding: 4rem 1.5rem;
      }

      .featured-grid {
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      .featured-card.large {
        grid-column: span 2;
      }

      /* About strip */
      .about-strip {
        grid-template-columns: 1fr;
      }

      .about-strip-left {
        padding: 4rem 2rem;
        border-right: none;
        border-bottom: 1px solid var(--dust);
      }

      .about-strip-right {
        min-height: unset;
        padding: 4rem 2rem;
      }

      @media (max-width: 640px) {
        .about-strip {
          display: flex;
          flex-direction: column;
        }
      }

      /* Quote */
      .quote-section {
        padding: 4rem 2rem;
      }

      /* Categories */
      .categories-section {
        padding: 4rem 1.5rem;
      }

      .cat-grid {
        grid-template-columns: 1fr 1fr;
      }

      .cat-card {
        padding: 2rem 1.5rem;
      }

      /* Writing */
      .writing-section {
        padding: 4rem 1.5rem;
      }

      /* Gallery hero */
      .gallery-hero {
        padding: 3rem 1.5rem;
      }

      /* Filter */
      .filter-bar {
        padding: 1.2rem 1.5rem;
      }

      /* Masonry */
      .masonry-section {
        padding: 2rem 1.5rem 4rem;
      }

      .masonry-grid {
        columns: 2;
        column-gap: 1rem;
      }

      .masonry-item {
        margin-bottom: 1rem;
      }

      /* Poetry */
      .poetry-list {
        padding: 2rem 1.5rem 4rem;
      }

      .poem-card {
        gap: 1.5rem;
        padding: 2rem 0;
      }

      /* Essays */
      .essay-list {
        padding: 2rem 1.5rem 4rem;
      }

      .essay-card {
        gap: 1.5rem;
      }

      /* Books */
      .books-grid {
        padding: 2rem 1.5rem 4rem;
        grid-template-columns: repeat(2, 1fr);
        gap: 2rem;
      }

      /* Letters */
      .letters-grid {
        padding: 2rem 1.5rem 4rem;
      }

      /* Detail pages */
      .detail-hero {
        grid-template-columns: 1fr;
      }

      .detail-image-side {
        position: relative;
        height: 55vw;
        min-height: 280px;

      // { "id": "p6", "title": "The Quiet Hours", "year": "2024", "medium": "Gouache on board", "dimensions": "16 x 12 inches", "category": "Gouache", "tags": ["interior", "solitude", "light"], "description": "A small, intimate study of morning light entering an empty room. The diffused quality of early light through muslin curtains creates a haze that softens every edge. A painting about the hour before the world makes its demands.", "thumb": "https://images.unsplash.com/photo-1536924940846-227afb31e2a5?w=600&q=80", "full": "https://images.unsplash.com/photo-1536924940846-227afb31e2a5?w=1200&q=90" }
      "artworks": [
        { "id": "a1", "title": "Residual Identity", "year": "2026", "medium": "Digital Art", "dimensions": "Variable", "category": "Abstract", "tags": ["abstract", "psychedelic", "pareidolia", "identity", "surreal"], "description": "A fleeting presence emerges within fluid gradients of magenta and yellow, something trying to become someone. The form suggests a face, but dissolves upon focus, as if he was there until you looked. Soft transitions and drifting contours evoke the instability of perception, where identity exists only momentarily, suspended between recognition and absence.", "thumb": "Images/IMG_28-03.png?w=600&q=80", "full": "Images/IMG_ResiduesOfIdentity.png?w=1200&q=90" },],
      // { "id": "a2", "title": "Study of Hands Series I", "year": "2023", "medium": "Graphite on cartridge paper", "dimensions": "14 x 11 inches", "category": "Graphite Study", "tags": ["anatomy", "hands", "study"], "description": "A series of graphite studies exploring the expressive potential of the human hand. Each drawing renders the subject at different states of tension and repose. Twelve sheets, shown here as the first in sequence.", "thumb": "https://images.unsplash.com/photo-1531685250784-7569952593d2?w=600&q=80", "full": "https://images.unsplash.com/photo-1531685250784-7569952593d2?w=1200&q=90" },
      // { "id": "a3", "title": "City Margins", "year": "2022", "medium": "Pen and ink on paper", "dimensions": "18 x 24 inches", "category": "Ink Drawing", "tags": ["urban", "lucknow", "architecture"], "description": "A dense pen-and-ink rendering of Lucknow's old city lanes, rickshaws, chai stalls, the fraying electric wires overhead. Drawn over several weeks from observation, not memory, it documents a city in quiet transition.", "thumb": "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=600&q=80", "full": "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=1200&q=90" },
      // { "id": "a4", "title": "Portrait of a Stranger", "year": "2024", "medium": "Charcoal on paper", "dimensions": "22 x 17 inches", "category": "Charcoal", "tags": ["portrait", "charcoal", "face"], "description": "A large charcoal portrait of an unknown figure encountered briefly. The face emerges from deep shadow, its features half-resolved as if being remembered rather than observed. The smudging is intentional, a representation of the unreliable witness.", "thumb": "https://images.unsplash.com/photo-1509909756405-be0199881695?w=600&q=80", "full": "https://images.unsplash.com/photo-1509909756405-be0199881695?w=1200&q=90" },
      // { "id": "a5", "title": "Tree in Winter", "year": "2021", "medium": "Ink wash on paper", "dimensions": "12 x 16 inches", "category": "Ink Wash", "tags": ["nature", "minimalism", "winter"], "description": "Inspired by Zen ink painting, this sparse work reduces a bare tree to its essential gesture. The ink wash pools and bleeds at the margins, suggesting the tree's presence even in absence.", "thumb": "https://images.unsplash.com/photo-1502759683299-cdcd6974244f?w=600&q=80", "full": "https://images.unsplash.com/photo-1502759683299-cdcd6974244f?w=1200&q=90" }
      "poems": [
        { "id": "po1", "title": "Letter to the Gomti", "year": "2023", "theme": "Place & Memory", "preview": "You carry the city's secrets / the way old women carry grief /  not loudly, not with ceremony...", "fullText": "You carry the city's secrets\nthe way old women carry grief,\nnot loudly, not with ceremony,\nbut in the slow accumulation\nof a thousand small surrenders.\n\nI have watched you shrink\neach summer, your banks retreating\nlike a shy guest who has outstayed\nhis welcome in someone else's home.\n\nStill, the children come.\nThey come the way children always come \nheedless and luminous,\ntrailing their laughter behind them\nlike kites in a wind that is thinning.\n\nI do not ask you to be\nwhat the poets made you.\nI only ask you to stay\nlong enough\nfor me to remember\nwhat staying looks like.", "notes": "Written after the 2025 dry season, during a period of prolonged absence from Lucknow." },
        { "id": "po2", "title": "The Weight of Hindi", "year": "2022", "theme": "Language & Identity", "preview": "There is a word in Hindi / that has no English shadow, / it lives in the throat...", "fullText": "There is a word in Hindi\nthat has no English shadow,\nit lives in the throat\nlike something swallowed\nand not yet digested.\n\nMy grandmother spoke it\nas naturally as breathing.\nI speak it the way one speaks\na language learned from books \nwith grammar and without music.\n\nBetween her tongue and mine\nlies the length of one generation\nand the width of a colonial education.\n\nI am trying to cross it.\nNot with the urgent gait\nof someone making up for lost time,\nbut with the tentative step\nof someone learning, again,\nto trust the ground.", "notes": "Part of a longer sequence examining language, inheritance, and the politics of expression." },
        { "id": "po3", "title": "Elegy for a Small Room", "year": "2024", "theme": "Loss & Dwelling", "preview": "The room does not know / you have left it. It keeps / your particular silence...", "fullText": "The room does not know\nyou have left it. It keeps\nyour particular silence,\nthe kind that arrives\nafter a voice has been present\na long time.\n\nThe window still holds\nthe angle of light you loved.\nThe walls still bear\nthe faint impression\nof everything you hung on them.\n\nA room is an archive.\nIt does not edit.\nIt does not spare you\nthe fact of your own absence\nwhen you return.\n\nI sit in the corner\nwhere your chair used to be\nand try to remember\nwhat it felt like\nto be in a room\nwith you in it.\n\nThe room is patient.\nIt is not waiting.\nIt has simply\nnot yet forgotten.", "notes": "Written for a friend who moved away. The small room is also a metaphor for the self." },
        { "id": "po4", "title": "Instructions for Reading Silence", "year": "2023", "theme": "Meditation", "preview": "Begin with the silence / that follows a question / no one knows how to answer...", "fullText": "Begin with the silence\nthat follows a question\nno one knows how to answer.\n\nNote how it is not empty,\nhow it is crowded, rather,\nwith the things\nthat cannot be said\nwithout being diminished.\n\nMove to the silence\nbetween two people\nwho love each other\nand have run out\nof safe words.\n\nFeel how it leans toward tenderness.\nHow it is only frightening\nif you have forgotten\nthat tenderness is not nothing.\n\nFinally, arrive at the silence\nafter music ends \nthat brief, held breath\nbefore the applause\nwhen the whole room\nis still inside the sound.\n\nThat is the one\nI return to.\nThat is the one\nI am always trying\nto write my way back into.", "notes": "A meditation on the varieties of silence. Influenced by John Cage and Gulzar equally." },
        { "id": "po5", "title": "Postcolonial Cartography", "year": "2022", "theme": "History & Identity", "preview": "They drew lines through us / the way one draws lines / through a word to show / it should be deleted...", "fullText": "They drew lines through us\nthe way one draws lines\nthrough a word to show\nit should be deleted,\nstill legible,\nbut marked for removal.\n\nThe lines became rivers,\nbecame fences,\nbecame the places\nwhere your father's people\nended\nand my father's people\nbegan.\n\nWe have spent seventy years\nlearning to call these lines natural.\n\nLook at a map.\nLook at how straight they are \nthe ones they drew.\nNature does not make\nstraight lines.\nNeither does love.\n\nI am learning to read\nthe old maps,\nthe ones drawn before\nsomeone decided\nthat what we were\nneeded to be corrected.\n\nThey are messier.\nThey are truer.\nThey look like\nwhat we actually are:\noverlapping,\nentangled,\nunresolvable.", "notes": "Written after reading Saadat Hasan Manto and rereading Partition histories." },
        { "id": "po6", "title": "in melancholy, part 1 & part 2", "year": "2023", "theme": "Desire, Contradiction & Self-Reckoning", "preview": "i, in melancholy / scream'd your name / desired your presence...", "fullText": "in melancholy, part 1\n\ni, in melancholy\nscream'd your name\ndesired your presence\nscream'd nothing but your name\nwant your presence\nstill you i hate\ni don't know why\ndesired you for being my mate\nmelancholy is reason for why\n\n\nin melancholy, part 2\n\ni, in melancholy, stayed not long.\ndevised a plan to come out young\nas a new self still the old soul\ni engaged to my mind\nmarried to my soul\nthey aren't different, but one alone\ni am desire, the passion personified\nuse me as an allegory\nfor i win worlds,\nof here,\nand those present everywhere.", "notes": "A two-part sequence exploring the paradoxes of longing and self-discovery. Part 1 traces the anguished contradiction of desire—screaming for a presence while harboring resentment, caught in the bewildering logic of melancholy where the reason and the feeling collapse into one another. Part 2 marks a turn inward: a refusal to remain trapped, a deliberate reconstruction of self where mind and soul converge. The speaker claims agency not through escape, but through integration—becoming desire itself, an allegory for transformation. The poem moves from victimhood to agency, from external longing to internal conquest, suggesting that melancholy, when metabolized, becomes a portal to worlds both intimate and infinite." },
        { "id": "po7", "title": "i", "year": "2023", "theme": "Connection & Transcendence", "preview": "i, walking down the street / looked for humans, / the very human traces...", "fullText": "i, walking down the street\nlooked for humans,\nthe very human traces\ni found none\njust different faces.\n\nall somehow confused\nin misery, fully fatigue fused\nso i stole my eyes away\nand looked all above\nvery high\nright to the night sky\n\nand what i saw, was hope in my case\nyour face\nthe very human trace.\nthe antidote to loneliness\nand a real source of true love.", "notes": "A meditation on the search for authentic humanity in a world of surfaces. The poem moves from earthward despair to skyward transcendence, only to discover that human connection, one specific face, one particular presence is itself the sublime. The lowercase 'i' functions as both pronoun and plea, a vulnerability that opens the possibility of encounter. Written as an extension of themes exploring isolation, recognition, and the redemptive power of genuine connection." }],
      "books": [
        { "id": "b1", "title": "Part Weird Part Fascinating", "year": "2025", "genre": "Poetry Collection", "publisher": "Gumroad/Amazon", "pages": "27", "description": "A debut collection of forty-three poems exploring absurd, love, longing, the weird but fascinating of regions inside us. With reflections and writings exploring curiosity, emotion, and the strange beauty of everyday thought. In <em>Part Weird, Part Fascinating</em>, the pieces move between introspection and observation, between ordinary moments and the quiet intensity they carry. The writing lingers in that space where the odd, the emotional, and the thoughtful meet.", "excerpt": "These pieces arrive at meaning slowly, the way realization arrives after a long moment of silence, when something small suddenly feels both strange and deeply familiar." },
        { "id": "b2", "title": "Under Destruction", "year": "2025", "genre": "Poetry & Illustration", "publisher": "Privately Circulated", "pages": "33", "description": "A raw, unfiltered collection of poems and short pieces exploring isolation, defiance, dark humor and longing. Designed for readers who prefer honesty over prettiness. The voice is confrontational, self aware, and often abrasive, moving between vulnerability and arrogance in the same breath. Sleepless nights, fractured relationships, obsessive love, technological disgust, wounded pride, and existential fatigue form the emotional backbone of the book. The language is blunt and sometimes profane, not for shock alone but to preserve authenticity. Each piece feels immediate, as if written in the middle of emotional combustion rather than after reflection. This is not poetry polished for elegance but expression left intentionally rough at the edges.", "excerpt": "The collection revolves around alienation and self fragmentation, presenting a speaker who feels detached from society yet intensely aware of it. Defiance appears as both armor and performance, with exaggerated confidence masking inner erosion. Longing threads through romantic obsession, missed connections, and unreciprocated devotion. Dark humor acts as a coping mechanism, turning despair into satire and self mockery into power. Together, these themes construct a voice that prefers honesty over prettiness and confrontation over comfort, appealing to readers who recognize beauty in emotional wreckage rather than refinement." },
        { "id": "b3", "title": "The Unfinished Map", "year": "2023", "genre": "Poetry Collection", "publisher": "Privately Circulated", "pages": "84", "description": "A debut collection of thirty-one poems exploring geography, memory, and the politics of belonging. The poems move between Lucknow's old city and imagined elsewhere, between Hindi and English, between what is said and what can only be suggested.", "excerpt": "These poems arrive at meaning the way monsoons arrive at the plains: sideways, obliquely, after a long preparation of heat." },
        { "id": "b4", "title": "Inheritance: Essays on Art and Memory", "year": "2022", "genre": "Essay Collection", "publisher": "Manuscript", "pages": "210", "description": "A collection of personal essays examining the relationship between visual art, cultural memory, and the experience of growing up in post-liberalisation India. Drawing on art history, personal anecdote, and close reading, these essays locate the self in the work.", "excerpt": "The book opens with a question: what does it mean to look at Indian art as an Indian, not as a subject of art-historical tourism, but as someone whose own life is in the frame?" },
        { "id": "b5", "title": "Notes from the Margin", "year": "2021", "genre": "Diaries & Fragments", "publisher": "Zine / Limited Print", "pages": "56", "description": "A slim volume of observations, fragments, and notebook entries gathered over three years. Part travel diary, part philosophical jotting, part sketch. This book refuses to resolve into any single genre, which is perhaps its point.", "excerpt": "Every margin is someone's centre. Every footnote was once the main text. This book began as notes made while reading other books." }],
      "essays": [
        { "id": "e1", "title": "On Looking at Painting in a Distracted Age", "type": "Essay", "date": "March 2025", "readTime": "3 min", "excerpt": "The problem with contemporary art consumption is not that we see too little. We see too quickly. The museum has become another scroll.", "body": "<p>In the february of 2026, I spent my entire day at two art galleries <em>Lalbhai Dalpatbhai Museum</em> and <em>ICAC Jodhpur Art Gallery</em> in Ahmedabad. The average time a visitor spends in front of a painting is somewhere between fifteen and thirty seconds. We are, as viewers, profoundly efficient.</p><h2>The Economy of Attention</h2><p>There is a kind of violence in this efficiency. Not a dramatic violence, but the quiet, structural violence of a system that has decided that looking, is a luxury most schedules cannot afford. The museum has become a content delivery mechanism with better lighting than the internet.</p><p>I do not say this to be curmudgeonly. I say it because I am implicated in it. I have stood in front of paintings and thought about what I was going to eat for dinner. I have photographed a Monet before I have seen a Monet.</p><h2>What Slow Looking Teaches</h2><p>When I stood in front of some paintings for a few minutes, something began to happen around the two-minute mark. The painting stopped being a painting I was looking at and became a space I was inhabiting. About sculptures, three figures I saw of Buddha, Mahavir and Mahavtara, their heavy-limbed melancholy, the flatness of their affect, the weight of their gaze, began to speak in ways that fifteen seconds could never have allowed.</p><p>Slow looking is a form of self-knowledge. It requires a willingness to stay with discomfort, to resist the impulse to resolve ambiguity, to allow a work to mean more than one thing at once.</p>" },
        { "id": "e2", "title": "Why I Write in English About Things I Feel in Hindi", "type": "Personal Essay", "date": "November 2024", "readTime": "2 min", "excerpt": "Language is not a neutral container. When I write in English, I am not simply translating thought into word. I am translating self into something the self does not entirely trust.", "body": "<p>There is a conversation I have been having with myself for approximately fifteen years. It goes something like this: you grew up speaking Hindi, dreaming in Hindi, quarrelling and loving in Hindi. Why, then, do you write in English?</p><h2>The Longer Answer</h2><p>The longer answer has to do with distance. English gives me a distance from my own experience that Hindi does not. When I write about my grandmother in English, I can observe her. When I try to write about her in Hindi, I am simply inside the memory, unable to see its edges.</p><p>Hindi, for me, is the language of the body. It is how I feel. English is the language of the mind. It is how I think about feeling. To write at all is to translate between these registers, and the translation is always lossy.</p><h2>What Is Lost and What Is Found</h2><p>I have begun, in recent years, to write poems in Hindi. They are private documents, largely. They do not have the craft of my English writing; they have something else instead, an immediacy, a rawness, a willingness to be plain that my English work sometimes lacks.</p>" },
        { "id": "e3", "title": "The Art of the Unfinished", "type": "Art Criticism", "date": "January 2024", "readTime": "3 min", "excerpt": "Da Vinci knew this: incompletion is not failure, but a refusal to lie. In the history of art, the unfinished work often carries more truth than the resolved one.", "body": "<p>Michelangelo's Prisoners, the series of figures emerging half-formed from blocks of marble in the Galleria dell'Accademia in Florence, are among the most powerful sculptures in Western art. They are unfinished. They are, by the conventional standard of their era, failed. And yet we return to them. We return because they show something that the finished work cannot show: the act of becoming.</p><p>Leonardo da Vinci understood this intimately. His notebooks overflow with unfinished sketches, half-explored ideas, studies abandoned in favor of deeper questioning. He refused to resolve what he had not yet fully understood. The Last Supper crumbles on its refectory wall, its very deterioration an argument for impermanence over polish. Da Vinci's legacy is not in completion, but in the courage of incompletion, the willingness to chase perfection before completed contracts and commissions. This genius has mentioned in his final moments that he is a failure. Was he?</p><p>I have a book that I have been working on, intermittently, for over a year. Every time I return to it, I find that I am not ready to finish it. The work, in its unresolved state, holds open a question that matters to me. To resolve it would be to pretend I have an answer I do not have. This is, I suspect, not inefficiency. It is a form of intellectual honesty made visible in paint, in words, in the deliberate refusal to close what must remain open. The unfinished work is the only honest mirror we have.</p>" },
        { "id": "e4", "title": "Lucknow as a Way of Seeing", "type": "Cultural Essay", "date": "July 2023", "readTime": "2 min", "excerpt": "Lucknow is beautiful not because of its dead nawabs, but in spite of them. The true genius of this city lies in the ordinary hands that built it, the streets that remember what palaces forget, the people who continue to make beauty from nothing.", "body": "<p>There is a myth about Lucknow that needs to be addressed. The narrative of Nawabi grandeur, of decaying palaces and faded courtly refinement, has calcified into a kind of museum piece that is pretty, nostalgic and fundamentally dishonest. This is not the real Lucknow. The real one is far more subversive, far more alive.</p><p>Walk through the mohallas of Lucknow and you will find the actual beauty: in the geometry of a fruit seller's arrangement of oranges on a wooden cart, in the way light breaks through the intricate lattice of a shopkeeper's awning, in the patient hands of a woman rolling dough in a kitchen no larger than a closet. This is where the true aesthetics live. Not in the broken arches of some abandoned haveli, but in the unbroken continuity of ordinary acts done with extraordinary care.</p><p>The cramped, chaotic, democratic streets of Lucknow are far more beautiful than any Nawabi monument. A narrow lane in Charbagh, where three generations of one family have sold the same spice blend, where children play cricket with a stick and a ball made of rags, where the sound of a bicycle bell mingles with the call to prayer: this is Lucknow. The beauty is in the texture of worn brick, in the way a makeshift shelter is built with such ingenuity it becomes architecture, in the infinite variations of human kindness enacted in a single day.</p><p>The people of Lucknow carry the real tradition. Not the rigid etiquette of courts, but something more vital: the ability to make space for one another in an impossibly crowded city. The courtesy that emerges not from hierarchy but from necessity and genuine affection. The wit that survives not in ghazal performances for the elite, but in the everyday language of the streets, where a shopkeeper's joke can contain more wisdom than a poet's couplet.</p><p>I believed that Lucknow's beauty was buried in its past. I was wrong. Its beauty is in what it continues to become. Every chipped step, every hand-painted sign, every improvised solution to an impossible problem, this is the real tehzeeb of Lucknow. Not the aesthetics of the court, but the aesthetics of survival and resilience and stubborn, everyday grace.</p>" }],
      "letters": [
        { "id": "l1", "title": "A Letter to a Young Artist", "type": "Open Letter", "date": "February 2024", "recipient": "To Whoever Needs This", "excerpt": "You asked me what advice I would give to someone starting out. I resisted answering for several months because I was suspicious of the question.", "body": "<p>You asked me what advice I would give to someone starting out. I resisted answering for several months because I was suspicious of the question. Not of you, of the form. Advice to young artists tends to be either so general as to be useless or so specific as to be merely autobiographical.</p><p>The first thing I would say: do not be in a hurry to arrive. The pressure on young artists now, the urgency to find an audience, to post the work, to build a following, is enormous and mostly counterproductive. An artist who is in a hurry to be seen is an artist who does not yet trust the work.</p><p>The second thing: make things that are too small for anyone else to care about. My best paintings have been of things no one suggested I paint, a specific quality of evening light on a specific wall, a face that no one else knows. The smallness of the subject is not a limitation. It is a precision.</p><p>The third thing, which is perhaps the most important: learn to be alone with the work. This silence is not empty. It is where the real work happens.</p><p>With warmth,<br/>Shreyash</p>" },
        { "id": "l2", "title": "On the Difficulty of Beginning", "type": "Blog", "date": "October 2023", "recipient": "Personal Journal", "excerpt": "Inspiration, not a lightning but a whisper and sometimes, the courage to listen which is harder than the work that follows.", "body": "<p>There is a particular species of silence that exists before creation begins. I have learned to recognize it, to sit with it, to understand that it is not emptiness but gestation. The blank page is not vacant; it is pregnant with infinite possibility, and the artist's task is not to fill it, but to midwife what already exists in the invisible realm between thought and form.</p><p>Inspiration, I have discovered, does not announce itself with fanfare. It arrives in fragments, a quality of light at dusk, the cadence of a overheard conversation, the ache of something unnamed in the chest. These glimmers appear unbidden, and the artist's work is to gather them like a child collecting shells, to hold them carefully without crushing them, to notice which ones sing when held to the ear.</p><p>The difficulty of beginning lies not in the absence of ideas, but in the courage required to honor them. To translate the ineffable into the material. To risk beauty and fail. To write the first sentence, knowing it might be wrong, and trusting that wrongness itself can be a kind of rightness if pursued with sincerity.</p><p>I have learned that inspiration and execution are not the same language. One whispers in dreams and metaphor; the other requires breath, discipline, the slow accumulation of small gestures. To begin is to accept this translation. To accept that what arrives as a feeling must be born as a choice.</p><p>Tomorrow, I will step into the studio again. I will lay down the first mark imperfect, uncertain, entirely mine. And in that moment of commitment, inspiration will finally have somewhere to land.</p>" },
        { "id": "l3", "title": "Notes on a Trip to Varanasi", "type": "Travel Writing", "date": "September 2023", "recipient": "For the Record", "excerpt": "Varanasi does not welcome you. It simply allows you to be present for a process that was happening long before you arrived.", "body": "<p>I arrived in Varanasi at five in the morning, stepping off an overnight train into the blue-black of pre-dawn. The city smelled of wood smoke and marigolds and the river, which smells of everything the river has received.</p><p>I spent three days walking. The ghats in the morning, the lanes in the afternoon, the rooftops at night. I drew in a sketchbook. I talked to a retired Sanskrit teacher who was feeding stray dogs outside his house. I watched a body burn.</p><p>What Varanasi teaches, what it insists on, if you stay long enough, is that time is not linear. The city has been continuously inhabited for three thousand years. Every layer is still present. The ancient and the contemporary do not succeed each other here; they coexist, uncomfortably, productively, in the same narrow lanes.</p><p>I came back to Lucknow with a notebook full of drawings I have not yet used. Varanasi gives you more than you can carry.</p>" },
        { "id": "l4", "title": "In Defence of Slowness", "type": "Blog", "date": "June 2024", "recipient": "Public Writing", "excerpt": "We have built an entire economy around the idea that faster is better. Art is the last resistance to this claim.", "body": "<p>I made a painting this spring that took four months. In an age of daily content drops, of algorithmically optimised productivity, four months for one thing feels almost perverse.</p><p>What four months contains: a full winter and most of a spring. Several hundred sessions, some lasting minutes, some hours. A dozen dead ends, two complete compositional rethinks, and one period of two weeks during which I was so convinced the painting was a failure that I nearly painted over it.</p><p>What it also contains, and this is the part I want to defend, is a quality of attention that shorter time spans cannot accumulate. The painting knows me now. I know its resistances. I know what the painting wants to be, which is different from what I initially thought I wanted it to be.</p><p>This is what slowness protects: the possibility of depth. And depth, in a culture that has largely stopped valuing it, feels like the most necessary thing I know how to make.</p>" },
        { "id": "l5", "title": "Notes on a Trip to Mount Abu", "type": "Travel Writing", "date": "February 2026", "recipient": "For the Record", "excerpt": "Mount Abu is Rajasthan's only hill station, which is perhaps why it carries an air of mild surprise at its own existence.", "body": "<p>I went to Mount Abu in March, which is already too warm in the plains. The drive up from Abu Road is the best part: the road narrows, the temperature drops by degrees, and the desert suddenly becomes something else. Scrub gives way to forest. The light changes quality.</p><p>The town itself is small and slightly bewildered by its own popularity. Tourists come for the lake, for the Dilwara temples, for the novelty of a hill in a flat state. I came because a friend insisted and because I had never been.</p><p>The Dilwara temples are the reason to go. I spent three hours inside them and could have spent three more. The marble carving is of a kind that makes you question what hands are actually capable of. Ceilings that look like lace. Pillars carved into forms that seem to have no structural logic, only decorative ambition. The craftsmen who built them are anonymous. Their work has outlasted any name they might have left.</p><p>I bought a small sketchbook in the market and filled half of it before I left. The rest I finished on the bus back. Mount Abu is the kind of place that makes you want to record things before you forget them, which is, I think, the definition of a place worth visiting.</p>" },
        { "id": "l6", "title": "Living in Ahmedabad for a Job", "type": "Blog", "date": "September 2025", "recipient": "Personal Journal", "excerpt": "Ahmedabad is a city that takes some time to understand. It does not offer itself immediately. You have to earn it.", "body": "<p>I moved to Ahmedabad for a three-month contract in July. I had been told it was a business city, not an art city. Both things turned out to be true and neither turned out to matter as much as I expected.</p><p>My flat was in Thaltej, a neighbourhood that is neither new nor exciting enough to be interesting, which suited me. I wanted to be somewhere I did not feel the pressure to explore. I wanted to work and to exist quietly.</p><p>Sabarmati Ashram changed this plan. I went once on a Sunday in my second week, being real that place wasn't interesting at all. I also tried old city, intending to spend an hour. I spent five. The pol houses, the carved wooden facades, the havelis in various states of repair and disrepair: all of it is a kind of argument that beauty is not incidental to daily life, that the people who built these houses believed the place where you lived was worth the effort of making beautiful. I wrote constantly. Man I loved Navratri.</p> <p> My output in those three months was higher than in any comparable period in Lucknow. Something about being a stranger in a city frees you. You have no obligations to it. You can look at it without the exhaustion of familiarity.</p><p>I left in October and came back in January for my last installment of work here till February, to leave with good memories, people, one complete collection of poetry, a copy of Atul Dodiya's Saptpadi, some more stupid shit I brought and a mild regret at leaving before the Summer, which I had been told is not formidable. Maybe that was wise. Or maybe I just was not ready to commit to it. Some cities you visit. Some cities ask you to stay. Ahmedabad asked, and I said not yet.</p><p>List of places I also visited: Adalaj Stepwell, Lalbhai Dalpatbhai Museum, Kasturbhai Lalbhai Museum, Indigo Art Gallery, Amdavad Ni Gufa & Gallery, ICAC Art Gallery, Riverfront, Teen Darwaja, Science City, University Area, HL, Kankaria, Akshardham, way too many movie theaters and a bunch of cafes. </p>" }]

          <p>Shreyash Srivastva (b. 2003, Lucknow) is a multidisciplinary artist and writer whose practice spans poetry, painting, drawing, and personal essays. He lives and works in Lucknow, India.</p>
          <p>His visual work is rooted in close observation of emotions, the absurd, and the human figure, and is executed primarily in oil, graphite, and ink. Recurring concerns include the noir aesthetic, cultural heritage, the politics of language in postcolonial India, and the phenomenology of light and dark.</p>
          <p>As a writer, he works across multiple genres: dirty realism to lyric poetry, free verse, simple phrasing and a cynical yet honest tone. His work includes critical essays on emotion and ideas; practicing visual art and culture; personal essays that resist genre; and an ongoing body of letters and journal writing. His writing has appeared in private circulations and literary journals, and he maintains a practice of making work for readers rather than audiences.</p>
          <p>He believes the visual and verbal practices are, at their deepest level, the same inquiry. Both begin from careful looking. Both are interested in what cannot be said directly. Both are forms of sustained attention in a world that rewards the opposite.</p>

    // ============================================
